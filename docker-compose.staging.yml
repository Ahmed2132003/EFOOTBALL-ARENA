# ============================================
# eFootball Arena — Staging Docker Compose
# Production-Like Environment for Testing
# ============================================
#
# الاستخدام:
#   docker-compose -f docker-compose.staging.yml up -d
#   docker-compose -f docker-compose.staging.yml down
#
# ملاحظة: يتطلب ملف .env.staging
# ============================================

version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────
  db:
    image: postgres:15-alpine
    container_name: efootball_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-efootball_staging}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staging_password}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - efootball_staging_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: efootball_staging_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    networks:
      - efootball_staging_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend (Staging) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: efootball_staging_backend
    restart: unless-stopped
    # Staging: لا نستخدم DEBUG
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-efootball_staging}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-staging_password}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,staging.efootball-arena.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5500}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - static_staging_volume:/app/staticfiles
      - media_staging_volume:/app/media
    ports:
      - "8765:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - efootball_staging_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker ────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: efootball_staging_celery_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=warning --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-efootball_staging}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-staging_password}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - media_staging_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - efootball_staging_network

  # ── Celery Beat ──────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: efootball_staging_celery_beat
    restart: unless-stopped
    command: >
      celery -A config beat
      --loglevel=warning
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-efootball_staging}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-staging_password}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - efootball_staging_network

# ── Volumes ───────────────────────────────────
volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  static_staging_volume:
    driver: local
  media_staging_volume:
    driver: local

# ── Networks ──────────────────────────────────
networks:
  efootball_staging_network:
    driver: bridge