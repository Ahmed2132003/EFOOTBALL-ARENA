# ============================================
# eFootball Arena — Pre-commit Hooks
# Automated Code Quality Before Every Commit
# ============================================
#
# كيفية التثبيت:
#   pip install pre-commit
#   pre-commit install
#
# كيفية التشغيل يدوياً:
#   pre-commit run --all-files
#
# كيفية تخطي الـ hooks مرة واحدة (للطوارئ فقط):
#   git commit --no-verify -m "Emergency fix"
# ============================================

default_language_version:
  python: python3.11

repos:
  # ── Built-in Pre-commit Hooks ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # إزالة المسافات الزائدة في نهاية الأسطر
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

      # ضمان وجود سطر فارغ في نهاية كل ملف
      - id: end-of-file-fixer

      # التحقق من صيغة YAML
      - id: check-yaml
        args: [--allow-multiple-documents]

      # التحقق من صيغة JSON
      - id: check-json

      # منع إضافة ملفات كبيرة الحجم
      - id: check-added-large-files
        args: ["--maxkb=1024"]

      # منع commit لـ .env files
      - id: check-merge-conflict

      # التحقق من أسماء الملفات
      - id: check-case-conflict

      # منع commit للبيانات الحساسة
      - id: detect-private-key

  # ── Black — Python Code Formatter ────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        args:
          - --line-length=88
          - --target-version=py311
        files: ^backend/
        exclude: ^backend/.*/migrations/

  # ── Isort — Python Import Sorter ─────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args:
          - --profile=black
          - --line-length=88
        files: ^backend/
        exclude: ^backend/.*/migrations/

  # ── Flake8 — Python Linter ────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503,E501
        files: ^backend/
        exclude: ^backend/.*/migrations/
        additional_dependencies:
          - flake8-bugbear