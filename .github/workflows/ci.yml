# ============================================
# eFootball Arena — GitHub Actions CI Pipeline
# Automated Testing + Quality + Coverage
# ============================================
#
# كيفية إضافة GitHub Secrets:
# Settings → Secrets and variables → Actions → New repository secret
# المطلوب: SECRET_KEY, DB_NAME, DB_USER, DB_PASSWORD
# ============================================

name: 🧪 CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ──────────────────────────────────────────
  # Job 1: Code Quality Checks
  # ──────────────────────────────────────────
  quality:
    name: 🎨 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install Quality Tools
        run: |
          pip install --upgrade pip
          pip install black==24.1.1 flake8==7.0.0 isort==5.13.2

      - name: 🖤 Black — Code Formatting Check
        run: |
          echo "Checking code formatting with Black..."
          black --check --diff backend/
        continue-on-error: false

      - name: 🔍 Flake8 — Linting Check
        run: |
          echo "Running Flake8 linter..."
          flake8 backend/ --config=backend/setup.cfg
        continue-on-error: false

      - name: 📦 Isort — Import Sorting Check
        run: |
          echo "Checking import sorting with isort..."
          isort --check-only --diff backend/ --settings-path=backend/setup.cfg
        continue-on-error: false

  # ──────────────────────────────────────────
  # Job 2: Tests + Coverage
  # ──────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: quality

    services:
      # PostgreSQL Service
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: efootball_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      # Redis Service
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      # Django Settings
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: "ci-secret-key-not-for-production-use-only"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

      # Database
      DB_NAME: efootball_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"

      # Redis
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0

      # CORS
      CORS_ALLOWED_ORIGINS: "http://localhost:5500"

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install Dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⏳ Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && echo "✅ PostgreSQL ready!" && break
            echo "⏳ Attempt $i/30..."
            sleep 2
          done

      - name: ⏳ Wait for Redis
        run: |
          echo "Waiting for Redis..."
          for i in {1..15}; do
            redis-cli -h localhost ping && echo "✅ Redis ready!" && break
            echo "⏳ Attempt $i/15..."
            sleep 2
          done

      - name: 🗄️ Run Database Migrations
        working-directory: backend
        run: |
          echo "Running Django migrations..."
          python manage.py migrate --noinput

      - name: 🧪 Run Tests with Coverage
        working-directory: backend
        run: |
          echo "Running pytest with coverage..."
          pytest tests/ users/tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings

      - name: 📊 Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: 📋 Display Test Summary
        if: always()
        run: |
          echo "=================================="
          echo "📊 Test Summary"
          echo "=================================="
          cat backend/coverage.xml | grep -o 'line-rate="[^"]*"' | head -1 | awk -F'"' '{printf "Coverage: %.1f%%\n", $2 * 100}'

  # ──────────────────────────────────────────
  # Job 3: Security Check
  # ──────────────────────────────────────────
  security:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔒 Check for Hardcoded Secrets
        run: |
          echo "Checking for potential hardcoded secrets..."

          # منع commit لـ .env files
          if git ls-files | grep -E '\.env$' | grep -v '.env.example'; then
            echo "❌ ERROR: .env files should not be committed!"
            exit 1
          fi

          echo "✅ No .env files found in repository"

          # تحذير عند وجود كلمات مشبوهة
          if grep -r "SECRET_KEY\s*=\s*['\"][^'\"\$]" backend/config/settings/ --include="*.py" 2>/dev/null; then
            echo "⚠️ WARNING: Possible hardcoded SECRET_KEY found!"
          fi

          echo "✅ Security check passed"

  # ──────────────────────────────────────────
  # Job 4: CI Summary
  # ──────────────────────────────────────────
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [quality, test, security]
    if: always()

    steps:
      - name: 📋 Print CI Summary
        run: |
          echo "=================================="
          echo "🚀 eFootball Arena CI Summary"
          echo "=================================="
          echo "Quality: ${{ needs.quality.result }}"
          echo "Tests:   ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "=================================="

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ CI FAILED — Tests did not pass"
            exit 1
          fi

          if [ "${{ needs.quality.result }}" = "failure" ]; then
            echo "❌ CI FAILED — Code quality checks failed"
            exit 1
          fi

          echo "✅ All checks passed! Ready to merge."