# ============================================
# eFootball Arena — Tool Configuration
# Flake8 + Isort + Coverage Settings
# ============================================

# ── Flake8 Configuration ─────────────────────
[flake8]
max-line-length = 88
extend-ignore =
    E203,
    W503,
    E501,
    W504
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    staticfiles,
    media,
    htmlcov
max-complexity = 10
per-file-ignores =
    tests/*: S101, S106
    */tests/*: S101, S106
    */migrations/*: E501

# ── Isort Configuration ──────────────────────
[isort]
profile = black
line_length = 88
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
known_django = django
known_drf = rest_framework
known_first_party = users, tactics, tournaments, marketplace, notifications, config
sections = FUTURE, STDLIB, THIRDPARTY, DJANGO, DRF, FIRSTPARTY, LOCALFOLDER
default_section = THIRDPARTY
skip_glob =
    */migrations/*
    .git
    __pycache__

# ── Coverage Configuration ───────────────────
[coverage:run]
source = .
branch = True
omit =
    */migrations/*
    */tests/*
    manage.py
    conftest.py
    */settings/*
    staticfiles/*
    media/*
    htmlcov/*
    .venv/*
    venv/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 70
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    pass

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml